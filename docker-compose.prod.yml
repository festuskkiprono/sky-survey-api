services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sky_survey_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/sky_survey_db.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  api:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sky_survey_db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      APP_UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db
    restart: unless-stopped

  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./deploy/dist:/usr/share/nginx/html
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  uploads: