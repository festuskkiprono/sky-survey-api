spring:
  application:
    name: sky-survey-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sky_survey_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 200MB
  app:
    uploads:
      # Where LocalDiskFileStorage puts certificate bytes.
      # Relative path = resolved against the app's working directory.
      dir: uploads