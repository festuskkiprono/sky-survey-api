services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sky_survey_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/sky_survey_db.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  pgdata: